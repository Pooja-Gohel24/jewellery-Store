services:
  - type: web
    name: jewellery-store-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        value: shimmer_jewelry_super_secret_key_2025
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: DATABASE_URL
        sync: false   # set in Render dashboard
      - key: EMAIL_PASSWORD
        sync: false   # Brevo API key — set in Render dashboard
      - key: EMAIL_FROM
        value: poojajgohel2@gmail.com
      - key: EMAIL_USERNAME
        value: poojajgohel2@gmail.com
      - key: FRONTEND_URL
        value: https://jewellery-store-tawny.vercel.app
      - key: ADMIN_SETUP_SECRET
        sync: false   # set in Render dashboard
